<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReservaPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark reservapro-navbar">
        <div class="container">
            <a class="navbar-brand fw-bold reservapro-navbar-brand" href="/">ReservaPro</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/crear">Nueva Cita</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/ver">Ver Citas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/cancelar">Cancelar Cita</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        {% for mensaje in get_flashed_messages() %}
            <div class="alert alert-info">{{ mensaje }}</div>
        {% endfor %}

        {% block content %}{% endblock %}

    </div>

    <footer class="text-center text-muted mt-5 py-3 border-top reservapro-footer">
        <small>ReservaPro &copy; 2026</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
